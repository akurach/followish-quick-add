<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Add for Followish (unofficial)</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        max-width: 640px; margin: 60px auto; padding: 0 20px; text-align: center;
        font: 16px/1.6 -apple-system, "SF Pro Text", system-ui, sans-serif;
        color: #1a1a1a; background: #fff;
      }
      @media (prefers-color-scheme: dark) { body { color: #ededf0; background: #161619; } a.btn { background:#9a86f5; color:#16161a; } }
      .mark { width: 64px; height: 64px; border-radius: 16px; background: #6e56cf;
        display: inline-grid; place-items: center; margin-bottom: 16px; }
      .mark svg { width: 40px; height: 40px; }
      h1 { font-size: 26px; letter-spacing: -0.01em; margin: 8px 0; }
      p { color: #5b5e66; }
      a.btn { display: inline-block; margin: 10px 6px; padding: 10px 18px; border-radius: 10px;
        background: #6e56cf; color: #fff; text-decoration: none; font-weight: 600; }
      a.txt { color: #6e56cf; }
    </style>
  </head>
  <body>
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 1 C12.8 8 16 11.2 23 12 C16 12.8 12.8 16 12 23 C11.2 16 8 12.8 1 12 C8 11.2 11.2 8 12 1 Z"/></svg>
    </div>
    <h1>Quick Add for Followish</h1>
    <p>Неофициальное расширение: в один клик добавляет товар с любой страницы
      в вишлист <a class="txt" href="https://followish.io">Followish</a> —
      имя, цена, галерея и варианты.</p>
    <p>
      <a class="btn" href="https://github.com/akurach/followish-quick-add">GitHub</a>
      <a class="btn" href="privacy.html">Политика конфиденциальности</a>
    </p>
  </body>
</html>
